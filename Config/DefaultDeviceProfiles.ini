[DeviceProfiles]
+DeviceProfileNameAndTypes=(Name="Android",DeviceType="Android")
+DeviceProfileNameAndTypes=(Name="Android_Quest",DeviceType="Android")
+DeviceProfileNameAndTypes=(Name="Android_Quest2",DeviceType="Android")
+DeviceProfileNameAndTypes=(Name="Android_Quest3",DeviceType="Android")
+DeviceProfileNameAndTypes=(Name="Android_QuestPro",DeviceType="Android")

[Android DeviceProfile]
DeviceType=Android
BaseProfileName=

; --- Texture Quality ---
; Prevent mobile from downgrading LOD mip levels for World/Terrain/Lava textures
+TextureLODGroups=(Group=TEXTUREGROUP_World,MaxLODSize=2048,OptionalMaxLODSize=2048,LODBias=0,MinLODSize=1,NumStreamedMips=-1,MipGenSettings=TMGS_SimpleAverage,MinMagFilter=aniso,MipFilter=point,MipLoadingPolicy=Default)
+TextureLODGroups=(Group=TEXTUREGROUP_WorldNormalMap,MaxLODSize=2048,OptionalMaxLODSize=2048,LODBias=0,MinLODSize=1,NumStreamedMips=-1,MipGenSettings=TMGS_SimpleAverage,MinMagFilter=aniso,MipFilter=point,MipLoadingPolicy=Default)
+TextureLODGroups=(Group=TEXTUREGROUP_WorldSpecular,MaxLODSize=2048,OptionalMaxLODSize=2048,LODBias=0,MinLODSize=1,NumStreamedMips=-1,MipGenSettings=TMGS_SimpleAverage,MinMagFilter=aniso,MipFilter=point,MipLoadingPolicy=Default)
+TextureLODGroups=(Group=TEXTUREGROUP_Terrain_Weightmap,MaxLODSize=4096,OptionalMaxLODSize=4096,LODBias=0,MinLODSize=1,NumStreamedMips=-1,MipGenSettings=TMGS_SimpleAverage,MinMagFilter=aniso,MipFilter=point,MipLoadingPolicy=Default)
+TextureLODGroups=(Group=TEXTUREGROUP_Terrain_Heightmap,MaxLODSize=4096,OptionalMaxLODSize=4096,LODBias=0,MinLODSize=1,NumStreamedMips=-1,MipGenSettings=TMGS_SimpleAverage,MinMagFilter=aniso,MipFilter=point,MipLoadingPolicy=Default)
+TextureLODGroups=(Group=TEXTUREGROUP_RenderTarget,MaxLODSize=2048,OptionalMaxLODSize=2048,LODBias=0,MinLODSize=1,NumStreamedMips=-1,MipGenSettings=TMGS_SimpleAverage,MinMagFilter=linear,MipFilter=linear,MipLoadingPolicy=Default)

; --- Anisotropic Filtering ---
; Terrain/lava surfaces viewed at an angle look blurry without this
+CVars=r.MaxAnisotropy=8

; --- Material Quality ---
; Android defaults to MaterialQualityLevel=0 (Low) which degrades material nodes.
; Set to 2 (High/Epic) so the lava landscape material runs its full shader path.
+CVars=r.MaterialQualityLevel=2

; --- Texture Streaming ---
; Disable screen-size-based mip capping so Quest's eye-buffer size
; doesn't trick the streamer into loading lower mip levels
+CVars=r.Streaming.MaxEffectiveScreenSize=0
+CVars=r.Streaming.LimitPoolSizeToVRAM=0
+CVars=r.Streaming.PoolSize=512


[Android_Quest DeviceProfile]
DeviceType=Android
BaseProfileName=Android

; Quest-specific overrides (inherits all Android settings above)
; Raise streaming pool to take advantage of Quest's 6–8 GB RAM
+CVars=r.Streaming.PoolSize=768

[Android_Quest2 DeviceProfile]
DeviceType=Android
BaseProfileName=Android_Quest

[Android_Quest3 DeviceProfile]
DeviceType=Android
BaseProfileName=Android_Quest

; Quest 3 has more headroom — allow larger streaming pool
+CVars=r.Streaming.PoolSize=1024

[Android_QuestPro DeviceProfile]
DeviceType=Android
BaseProfileName=Android_Quest

